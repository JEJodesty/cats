services:
  ipfs_migration:
    image: ipfs/kubo:release
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${INTEGRATION_INPUT_DATA_CACHE:?INTEGRATION_INPUT_DATA_CACHE must be set}:/outputs
  ipfs_integration:
    image: ipfs/kubo:release
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${INTEGRATION_INPUT_DATA_CACHE:?INTEGRATION_INPUT_DATA_CACHE must be set}:/outputs
